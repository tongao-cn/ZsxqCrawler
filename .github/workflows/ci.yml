name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"

jobs:
  tests:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install project
        run: uv sync

      - name: Run unit tests
        run: uv run python -m unittest discover -s tests

      - name: Check core schema CLI help
        run: uv run manage-postgres-core-schema --help

      - name: Check core migration CLI help
        run: uv run migrate-postgres-schemas-to-core --help

      - name: Check core group id backfill CLI help
        run: uv run backfill-postgres-core-group-ids --help

      - name: Check public schema CLI help
        run: uv run manage-postgres-public-schema --help

      - name: Check PostgreSQL status report CLI help
        run: uv run generate-postgres-status-report --help

      - name: Check PostgreSQL legacy archive report CLI help
        run: uv run generate-postgres-legacy-archive-report --help

      - name: Check reader access CLI help
        run: uv run verify-postgres-reader-access --help

      - name: Check writer access CLI help
        run: uv run verify-postgres-writer-access --help

      - name: Check real cutover probe CLI help
        run: uv run run-postgres-real-cutover-probe --help
