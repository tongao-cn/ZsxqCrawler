name: PostgreSQL Shared Smoke

on:
  workflow_dispatch:

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"

jobs:
  smoke:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install project
        run: uv sync

      - name: Run PostgreSQL shared smoke
        shell: pwsh
        run: .\scripts\run_postgres_shared_smoke.ps1
