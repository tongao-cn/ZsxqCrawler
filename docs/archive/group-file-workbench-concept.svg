<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <style>
      .bg { fill: #f6f7f9; }
      .panel { fill: #ffffff; stroke: #d9dee7; stroke-width: 1.2; }
      .soft { fill: #f9fafb; stroke: #e3e7ee; stroke-width: 1; }
      .muted { fill: #6b7280; font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; }
      .text { fill: #111827; font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; }
      .title { fill: #0f172a; font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; font-weight: 700; }
      .small { font-size: 18px; }
      .body { font-size: 21px; }
      .label { font-size: 16px; }
      .h1 { font-size: 32px; }
      .h2 { font-size: 24px; font-weight: 700; }
      .tab { fill: #eef2f7; }
      .tabActive { fill: #111827; }
      .tabText { fill: #4b5563; font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; font-size: 18px; }
      .tabTextActive { fill: #ffffff; font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; font-size: 18px; font-weight: 700; }
      .blue { fill: #2563eb; }
      .green { fill: #059669; }
      .amber { fill: #d97706; }
      .red { fill: #dc2626; }
      .line { stroke: #e5e7eb; stroke-width: 1; }
      .chip { fill: #eef2ff; stroke: #c7d2fe; }
      .chipText { fill: #3730a3; font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; font-size: 16px; font-weight: 700; }
      .btn { fill: #111827; }
      .btnText { fill: #ffffff; font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; font-size: 17px; font-weight: 700; }
      .btnGhost { fill: #ffffff; stroke: #d1d5db; }
      .btnGhostText { fill: #374151; font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; font-size: 17px; font-weight: 700; }
      .dangerSoft { fill: #fef2f2; stroke: #fecaca; }
      .shadow { filter: drop-shadow(0 10px 24px rgba(15, 23, 42, 0.08)); }
