<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980">
  <defs>
    <style>
      .bg { fill: #f6f7f9; }
      .panel { fill: #ffffff; stroke: #d9dee7; stroke-width: 1.5; }
      .soft { fill: #f9fafb; stroke: #e2e8f0; stroke-width: 1.2; }
      .primary { fill: #2563eb; }
      .green { fill: #059669; }
      .amber { fill: #d97706; }
      .violet { fill: #7c3aed; }
      .text { fill: #111827; font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; }
      .muted { fill: #6b7280; font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; }
      .label { fill: #ffffff; font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 18px; font-weight: 600; }
      .title { font-size: 30px; font-weight: 700; }
      .h2 { font-size: 22px; font-weight: 700; }
      .body { font-size: 17px; }
      .small { font-size: 14px; }
      .tiny { font-size: 12px; }
      .chip { fill: #eef2ff; stroke: #c7d2fe; }
      .chip-green { fill: #dcfce7; stroke: #86efac; }
      .chip-amber { fill: #fef3c7; stroke: #fcd34d; }
      .line { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="980"/>

  <text class="text title" x="48" y="58">每日分析工作台重构草图</text>
  <text class="muted body" x="48" y="88">核心路径：选日期 → 跑任务 → 选概念 → 看股票 → 点股票/话题深挖</text>

  <rect class="panel" x="48" y="116" width="1344" height="104" rx="10"/>
  <text class="text h2" x="72" y="154">顶部控制区</text>
  <rect class="soft" x="72" y="174" width="190" height="30" rx="6"/>
  <text class="muted small" x="88" y="194">日期：2026-05-08</text>
  <rect class="primary" x="284" y="170" width="160" height="38" rx="7"/>
  <text class="label" x="309" y="195">分析当天话题</text>
  <rect class="green" x="462" y="170" width="190" height="38" rx="7"/>
  <text class="label" x="484" y="195">提取股票概念</text>
  <rect class="soft" x="670" y="170" width="110" height="38" rx="7"/>
  <text class="text body" x="704" y="195">刷新</text>
  <rect class="soft" x="798" y="170" width="140" height="38" rx="7"/>
  <text class="text body" x="825" y="195">任务日志</text>
  <text class="muted small" x="980" y="194">所有操作只读数据库已有话题，不触发爬取</text>

  <rect class="panel" x="48" y="248" width="380" height="520" rx="10"/>
  <text class="text h2" x="72" y="288">概念榜</text>
  <text class="muted small" x="72" y="314">默认按去重来源话题数排序</text>

  <rect class="soft" x="72" y="338" width="332" height="78" rx="8"/>
  <text class="text body" x="92" y="366">1. 算力产业链</text>
  <rect class="chip" x="92" y="378" width="62" height="22" rx="11"/>
  <text class="muted tiny" x="104" y="394">话题 8</text>
  <rect class="chip-green" x="162" y="378" width="52" height="22" rx="11"/>
  <text class="muted tiny" x="174" y="394">推 5</text>
  <rect class="chip-amber" x="222" y="378" width="92" height="22" rx="11"/>
  <text class="muted tiny" x="236" y="394">多话题共振</text>

  <rect class="soft" x="72" y="430" width="332" height="78" rx="8"/>
  <text class="text body" x="92" y="458">2. 机器人</text>
  <rect class="chip" x="92" y="470" width="62" height="22" rx="11"/>
  <text class="muted tiny" x="104" y="486">话题 4</text>
  <rect class="chip-green" x="162" y="470" width="52" height="22" rx="11"/>
  <text class="muted tiny" x="174" y="486">推 2</text>

  <rect class="soft" x="72" y="522" width="332" height="78" rx="8"/>
  <text class="text body" x="92" y="550">3. 固态电池</text>
  <rect class="chip" x="92" y="562" width="62" height="22" rx="11"/>
  <text class="muted tiny" x="104" y="578">话题 3</text>
  <rect class="chip-green" x="162" y="562" width="52" height="22" rx="11"/>
  <text class="muted tiny" x="174" y="578">推 1</text>
  <rect class="chip" x="222" y="562" width="62" height="22" rx="11"/>
  <text class="muted tiny" x="234" y="578">新出现</text>

  <rect class="soft" x="72" y="614" width="332" height="78" rx="8"/>
  <text class="text body" x="92" y="642">4. 单篇列表型概念</text>
  <rect class="chip" x="92" y="654" width="62" height="22" rx="11"/>
  <text class="muted tiny" x="104" y="670">话题 1</text>
  <rect class="chip-amber" x="162" y="654" width="92" height="22" rx="11"/>
  <text class="muted tiny" x="176" y="670">单话题扩散</text>

  <text class="muted small" x="72" y="728">点击概念 = 选中概念</text>
  <text class="muted small" x="72" y="750">不再用大量 chip 堆满页面</text>

  <rect class="panel" x="456" y="248" width="936" height="520" rx="10"/>
  <text class="text h2" x="480" y="288">股票概念工作台</text>

  <rect class="soft" x="480" y="312" width="888" height="58" rx="8"/>
  <text class="text body" x="500" y="347">当前概念：算力产业链</text>
  <rect class="primary" x="710" y="326" width="132" height="28" rx="6"/>
  <text class="label small" x="728" y="346">只看推荐池命中</text>
  <rect class="soft" x="858" y="326" width="92" height="28" rx="6"/>
  <text class="text small" x="880" y="346">清除筛选</text>
  <text class="muted small" x="980" y="346">展示 5 / 21 只股票</text>

  <rect class="soft" x="480" y="392" width="888" height="172" rx="8"/>
  <text class="text body" x="500" y="424">选中概念详情</text>
  <text class="muted small" x="500" y="452">来源话题 8 / 相关股票 21 / 推荐池命中 5 / 7 天累计话题 18</text>
  <rect class="chip" x="500" y="470" width="92" height="24" rx="12"/>
  <text class="muted tiny" x="514" y="486">多话题共振</text>
  <rect class="chip-green" x="602" y="470" width="92" height="24" rx="12"/>
  <text class="muted tiny" x="616" y="486">推荐池共振</text>
  <text class="muted small" x="500" y="526">近 7 天趋势：05-02 1(3)  05-03 2(6)  05-04 2(5)  05-05 3(9)  05-06 4(11)  05-07 6(15)  05-08 8(21)</text>

  <rect class="soft" x="480" y="588" width="888" height="148" rx="8"/>
  <text class="text body" x="500" y="620">股票列表</text>
  <line x1="500" y1="638" x2="1348" y2="638" stroke="#e5e7eb"/>
  <text class="muted small" x="500" y="662">股票</text>
  <text class="muted small" x="660" y="662">代码</text>
  <text class="muted small" x="780" y="662">推荐池</text>
  <text class="muted small" x="900" y="662">来源话题</text>
  <text class="muted small" x="1060" y="662">理由摘要</text>
  <line x1="500" y1="676" x2="1348" y2="676" stroke="#e5e7eb"/>
  <text class="text small" x="500" y="702">中际旭创</text>
  <text class="text small" x="660" y="702">300308.SZ</text>
  <rect class="chip-green" x="780" y="686" width="52" height="22" rx="11"/>
  <text class="muted tiny" x="792" y="702">命中</text>
  <text class="text small" x="900" y="702">8225..., 4554...</text>
  <text class="muted small" x="1060" y="702">光模块链条持续强化...</text>

  <rect class="panel" x="48" y="796" width="1344" height="132" rx="10"/>
  <text class="text h2" x="72" y="836">每日话题报告</text>
  <text class="muted body" x="72" y="868">Markdown 报告独立全宽展示，不和股票概念工作台混在一起。</text>
  <text class="muted body" x="72" y="898">来源话题弹窗、股票详情弹窗保留为深挖入口。</text>

  <path class="line" d="M238 768 C238 800, 520 804, 520 736"/>
  <text class="muted small" x="302" y="805">选概念后刷新右侧详情和股票列表</text>
</svg>
